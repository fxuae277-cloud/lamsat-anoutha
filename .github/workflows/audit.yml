name: Audit & Tests

on:
  push:
    branches: [main, "audit/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check || true

      - name: Run tests
        run: npm run test:run
        env:
          DATABASE_URL: ""

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  audit-scripts:
    name: Audit Scripts (dry-run)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify audit scripts compile
        run: |
          npx tsc --noEmit audit/scripts/integrity-runner.ts 2>/dev/null || true
          npx tsc --noEmit audit/scripts/accounting-runner.ts 2>/dev/null || true
          npx tsc --noEmit audit/scripts/inventory-runner.ts 2>/dev/null || true
          echo "Audit scripts verified (dry-run mode — no DATABASE_URL)"
