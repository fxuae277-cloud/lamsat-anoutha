name: Deploy to Replit

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Replit Deployment
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.REPLIT_DEPLOY_HOOK }}" \
          | grep -qE "^2" && echo "Deployment triggered successfully." || (echo "Deployment webhook failed." && exit 1)
